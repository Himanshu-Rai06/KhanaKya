<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KhanaKya? — Premium Smart Meal Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="logo-group">
      <h1 class="logo">KhanaKya?</h1>
      <span>Smart Menu Planner</span>
    </div>
    <div class="header-actions">
      <button id="shareBtn" class="btn btn-secondary btn-sm" title="Copy shareable link to clipboard">
        <span>🔗 Share Menu</span>
      </button>
      <button id="themeBtn" class="theme-btn" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <div class="app-container">
    <aside id="sidebar" class="sidebar">
      <div class="filter-group">
        <label class="section-title">Dietary Preference</label>
        <div class="pill-switch">
          <button class="diet-pill active" data-type="all">All</button>
          <button class="diet-pill veg" data-type="veg">🟢 Veg</button>
          <button class="diet-pill nonveg" data-type="nonveg">🔴 Non-Veg</button>
        </div>
      </div>

      <div class="filter-group">
        <label class="section-title">Who is Eating?</label>
        <div class="checkbox-stack">
          <label class="check-container">
            <input type="checkbox" id="chk-me" value="me" checked>
            <span class="custom-check"></span>
            <div class="check-label-text">
              <span class="title">🙋 Me Only</span>
            </div>
          </label>
          <label class="check-container">
            <input type="checkbox" id="chk-roommate" value="roommate" checked>
            <span class="custom-check"></span>
            <div class="check-label-text">
              <span class="title">🤝 Roommate Only</span>
            </div>
          </label>
        </div>
      </div>

      <div class="filter-group">
        <div class="slider-header">
          <label class="section-title">Max Cooking Effort</label>
          <span id="effortValue" class="badge">Medium (3/5)</span>
        </div>
        <input type="range" id="effortSlider" min="1" max="5" value="3" step="1">
        <div class="slider-labels">
          <span>Lazy</span>
          <span>Chef Mood</span>
        </div>
      </div>

      <div class="filter-group">
        <label class="section-title">Hunger & Meal Type</label>
        <div class="hunger-grid">
          <button class="hunger-btn active" data-hunger="snack">
            <span class="emoji">🍿</span>
            <span class="label">Snack</span>
          </button>
          <button class="hunger-btn active" data-hunger="light">
            <span class="emoji">🥣</span>
            <span class="label">Light Meal</span>
          </button>
          <button class="hunger-btn active" data-hunger="meal">
            <span class="emoji">🍱</span>
            <span class="label">Proper Meal</span>
          </button>
          <button class="hunger-btn active" data-hunger="outside">
            <span class="emoji">💸</span>
            <span class="label">Outside Order</span>
          </button>
        </div>
      </div>

      <div class="filter-group">
        <label class="section-title">Filter by Tag Categories</label>
        <div id="dynamicTags" class="tags-cloud"></div>
      </div>

      <div class="sidebar-actions">
        <button id="decideBtn" class="btn btn-primary pulse">
          <span>🎲 DECIDE FOR ME</span>
        </button>
        <button id="resetFilters" class="btn btn-secondary text-sm">Reset Selections</button>
      </div>
    </aside>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <main class="main-content">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search dishes, ingredients, or cuisines...">
        </div>
        <div class="sorting-controls">
          <select id="sortSelect" class="form-select">
            <option value="score">🎯 Sort by Recommendation Score</option>
            <option value="effort">⚡ Lowest Effort First</option>
            <option value="time">⏱ Quickest Cook Time</option>
            <option value="cost">💰 Cheapest Cost</option>
            <option value="popularity">🔥 Peak Popularity</option>
          </select>
          <div id="resultsCount" class="results-count">Loading menu...</div>
          <button id="mobileFilterToggle" class="btn btn-secondary mobile-only">🎛 Filters</button>
        </div>
      </div>

      <div id="mealsGrid" class="meals-grid skeleton-loading">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </main>
  </div>

  <div id="mealModal" class="modal-overlay">
    <div class="modal-card">
      <button class="modal-close" onclick="closeAllModals()">&times;</button>
      <div class="modal-hero">
        <span id="mEmoji" class="modal-emoji">🍲</span>
        <h2 id="mName" class="modal-title">Dish Name</h2>
        <div id="mTypeBadge" class="veg-dot"></div>
      </div>
      <div class="modal-body">
        <p id="mDescription" class="modal-desc">Description text goes here.</p>
        
        <div class="modal-metrics-grid">
          <div class="metric-item"><small>Effort</small><strong id="mEffort">3/5</strong></div>
          <div class="metric-item"><small>Prep Time</small><strong id="mTime">20m</strong></div>
          <div class="metric-item"><small>Est. Cost</small><strong id="mCost">₹50</strong></div>
          <div class="metric-item"><small>Audience</small><strong id="mWho">Both</strong></div>
        </div>

        <div class="ingredients-section">
          <h3>🛒 Ingredients Needed</h3>
          <div id="mIngredients" class="ingredients-list"></div>
        </div>

        <div class="tags-section">
          <h3>🏷 Categories</h3>
          <div id="mTags" class="tags-cloud"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="rouletteModal" class="modal-overlay roulette-overlay">
    <div class="roulette-box">
      <h2>Picking the Perfect Choice...</h2>
      <div class="spinner-container">
        <div id="rouletteStrip" class="roulette-strip">
          </div>
        <div class="pointer-line"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Link copied to clipboard!</div>

  <script src="script.js" defer></script>
</body>
</html>
